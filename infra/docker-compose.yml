name: plc_simulator

services:
  codesys:
    build:
      context: ../services/codesys
    container_name: codesys
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../services/codesys/CODESYSControl_User.cfg:/etc/codesyscontrol/CODESYSControl_User.cfg:ro
      - codesys_data:/var/opt/codesys

  gateway:
    build:
      context: ../services/gateway
    container_name: gateway
    hostname: plc-gateway
    ports:
      - "3001:3001"
    environment:
      API_PORT: "3001"
      POLL_MS: "100"
      OPCUA_ENDPOINT: opc.tcp://host.docker.internal:4840
      DB_HOST: database
      DB_PORT: "5432"
      DB_USER: plc
      DB_PASS: plc_pass
      DB_NAME: plc_events
      CUSTOMERS_ROOT: /data/customers
      PLANT_TEMPLATES_ROOT: /data/plant_templates
      RUNTIME_ROOT: /data/runtime
      PLC_CONTAINER: codesys
      DOCKER_SOCKET: /var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../data/customers:/data/customers
      - ../data/plant_templates:/data/plant_templates
      - ../data/runtime:/data/runtime
      - ../services/ui/public:/app/public:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - gateway_pki:/root/.config/node-opcua-default-nodejs
    depends_on:
      - codesys
      - database
    restart: unless-stopped

  ui:
    build:
      context: ../services/ui
    container_name: ui
    ports:
      - "5173:80"
    depends_on:
      - gateway
    restart: unless-stopped

  database:
    build:
      context: ../services/db
    container_name: database
    environment:
      POSTGRES_USER: plc
      POSTGRES_PASSWORD: plc_pass
      POSTGRES_DB: plc_events
    ports:
      - "5432:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
      - ../services/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

volumes:
  database_data:
  codesys_data:
  gateway_pki:
