                           oc === 'ACTIVATED' ? '✅ ACTIVATED' :
                           oc === 'MAX_ITERATIONS' ? '⚠ MAX ITER' : '⏳ ...';
            
            const timeStr = fmtTime(cycle.simTimeSec);
            const nConflicts = cycle.conflicts ? cycle.conflicts.length : 0;
            const details = cycle.outcomeDetails || {};
            
            let blockingHtml = '';
            if (details.userReason) {
                const reasonColor = oc === 'ACTIVATED' ? '#2e7d32' : '#c62828';
                blockingHtml = `<div class="cycle-card-blocking" style="color:${reasonColor}; font-weight: 600;">${details.userReason}</div>`;
            } else if (oc === 'REJECTED' && details.blockingConflict) {
                blockingHtml = `<div class="cycle-card-blocking">`;
                blockingHtml += `Blocked: ${details.blockingConflict}`;
                if (details.missing) blockingHtml += ` — missing ${details.missing}s`;
                blockingHtml += `</div>`;
            } else if (oc === 'MAX_ITERATIONS') {
                blockingHtml = `<div class="cycle-card-blocking" style="color:#f57f17;">Reached ${details.iterations || 50} iterations without convergence</div>`;
            }
            
            let statsHtml = `<div class="cycle-card-stats">`;
            if (nConflicts > 0) {
                const solved = cycle.conflicts.filter(c => c.solved).length;
                const failed = nConflicts - solved;
                statsHtml += `${nConflicts} conflicts: ${solved} resolved`;
                if (failed > 0) statsHtml += `, ${failed} failed`;
            } else {
                statsHtml += 'No conflicts in this cycle';
            }
            if (details.iterations) statsHtml += ` (${details.iterations} iter)`;
            statsHtml += `</div>`;
            
            // Expanded details: show each conflict in the chain
            let detailsHtml = '';
            if (isExpanded && nConflicts > 0) {
                detailsHtml = '<div class="cycle-card-details" style="display:block;">';
                for (let ci = 0; ci < cycle.conflicts.length; ci++) {
                    const conf = cycle.conflicts[ci];
                    const pair = `B${conf.prevBatchId}s${conf.prevStage} ↔ B${conf.nextBatchId}s${conf.nextStage}`;
                    const deficit = conf.deficit ? conf.deficit.toFixed(1) + 's' : '?';
                    const resClass = conf.solved ? 'ok' : 'fail';
                    const resText = conf.solved ? `✓ ${conf.reason}` : `✗ ${conf.reason}${conf.missing ? ' (missing ' + conf.missing + 's)' : ''}`;
                    
                    let actionsHtml = '';
                    if (conf.actions && conf.actions.length > 0) {
                        const acts = conf.actions.map(a => {
                            if (a.action === 'ADVANCE') return `⬅ ADVANCE B${a.batchId}s${a.stage} ${a.amount}`;
                            if (a.action === 'DELAY') return `➡ DELAY B${a.batchId}s${a.stage} ${a.amount}`;
                            return `${a.action} B${a.batchId}s${a.stage}`;
                        }).join(', ');
                        actionsHtml = `<div class="dc-actions">${acts}</div>`;
                    }
                    
                    detailsHtml += `<div class="detail-conflict">`;
                    detailsHtml += `<div class="dc-header"><span class="dc-pair">${pair}</span> <span class="dc-result ${resClass}">${resText}</span></div>`;
                    detailsHtml += `<div style="font-size:10px;color:#999;">overlap: ${deficit}</div>`;
                    detailsHtml += actionsHtml;
                    detailsHtml += `</div>`;
                }
                detailsHtml += '</div>';
            }
            
            return `
                <div class="cycle-card ${ocClass} ${isExpanded ? 'expanded' : ''}" onclick="toggleCycleDetails(${idx})">
                    <div class="cycle-card-header">
                        <span class="cycle-card-batch">B${cycle.batchId || '?'} @ ${timeStr}</span>
                        <span class="cycle-card-outcome ${ocClass}">${ocLabel}</span>
                    </div>
                    ${blockingHtml}
                    ${statsHtml}
                    ${detailsHtml}
                </div>
            `;
        }
        
        // Auto-refresh if panel is open and not paused
        setInterval(() => {
            if (conflictPanelVisible && !isPaused) {
                refreshConflicts();
            }
        }, 3000);
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateZoomLabel();
            loadSchedule();
            startAutoRefresh();
        });
        
        // Stop auto-refresh when page is hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopAutoRefresh();
            } else {
                startAutoRefresh();
            }
        });
    </script>
</body>
</html>
